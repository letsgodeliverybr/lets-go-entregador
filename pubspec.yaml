name: lets_go_entregador
description: Lets Go Delivery app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: any
  latlong2: any
  supabase_flutter: any
  cupertino_icons: ^1.0.2
  flutter_local_notifications: ^17.2.4
  geolocator: ^11.1.0
  just_audio: ^0.9.36
  share_plus: ^7.2.2
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
