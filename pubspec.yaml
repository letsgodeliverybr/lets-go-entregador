name: lets_go_entregador
description: Lets Go Delivery app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: any
  latlong2: any
  supabase_flutter: any
  cupertino_icons: ^1.0.2
  flutter_local_notifications: ^17.2.4
  geolocator: ^11.1.0
  just_audio: ^0.9.36
  share_plus: ^7.2.2
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.10+1
  image_picker: any
  intl: ^0.19.0
  mask_text_input_formatter: ^2.9.0
  firebase_core: any
  firebase_messaging: any
  workmanager: ^0.5.2
  wakelock_plus: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: any

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/icon/
